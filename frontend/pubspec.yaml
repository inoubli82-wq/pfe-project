name: import_export_app
description: AST Logitrack - Import/Export Logistics Management
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.1
  http: ^1.2.0
  connectivity_plus: ^6.0.2

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI & Design
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Forms & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

  # Utilities
  intl: any
  logger: ^2.2.0
  equatable: ^2.0.5
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/images/splash/
    - assets/images/dashboard/
